name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KIND_NODE_IMAGE: kindest/node:v1.35.0

jobs:
  e2e-ginkgo:
    name: Ginkgo E2E Tests (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        # The Ginkgo suite is split into 3 shards by Ginkgo label so each runs on
        # its own Kind cluster in parallel, cutting the lane from ~28m to ~13m.
        # The "layout" shard is a catch-all complement so any spec not explicitly
        # claimed by "core" or "api" (including future unlabeled Describes) still
        # runs exactly once — no coverage is silently dropped. The three filters
        # are disjoint and exhaustive over the suite's labels.
        shard:
          - name: core
            filter: "gateway || manager || webhooks || external-gateway"
          - name: api
            filter: "dual-version || manual-mode || management-handle"
          - name: layout
            filter: "!(gateway || manager || webhooks || external-gateway || dual-version || manual-mode || management-handle)"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Run Ginkgo e2e tests
        run: make test-e2e GINKGO_LABEL_FILTER='${{ matrix.shard.filter }}' KIND_CLUSTER='garage-e2e-${{ matrix.shard.name }}'

      - name: Collect debug info
        if: failure()
        run: |
          mkdir -p /tmp/e2e-debug
          kind get clusters > /tmp/e2e-debug/clusters.txt 2>&1 || true
          for cluster in $(kind get clusters 2>/dev/null); do
            kubectl --context "kind-$cluster" get all -A > "/tmp/e2e-debug/${cluster}-resources.txt" 2>&1 || true
            kubectl --context "kind-$cluster" logs deployment/garage-operator-controller-manager -n garage-operator-system --tail=200 > "/tmp/e2e-debug/${cluster}-operator.txt" 2>&1 || true
          done

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ginkgo-e2e-logs-${{ matrix.shard.name }}
          path: /tmp/e2e-debug/
          retention-days: 7

  # Aggregator gate: branch protection requires a status check named exactly
  # "Ginkgo E2E Tests". The sharded matrix above produces per-shard checks
  # ("Ginkgo E2E Tests (core)", ...), so this single job preserves the required
  # check name and passes only when every shard succeeded.
  e2e-ginkgo-result:
    name: Ginkgo E2E Tests
    runs-on: ubuntu-latest
    needs: [e2e-ginkgo]
    if: always()
    steps:
      - name: Verify all Ginkgo shards passed
        run: |
          result='${{ needs.e2e-ginkgo.result }}'
          echo "Aggregate shard result: $result"
          if [ "$result" != "success" ]; then
            echo "::error::One or more Ginkgo E2E shards did not succeed ($result)"
            exit 1
          fi
          echo "All Ginkgo E2E shards passed."

  e2e-cluster:
    name: Single-Cluster E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run single-cluster e2e tests
        run: make test-e2e-cluster

      # The script's trap dumps operator logs + resources to /tmp/e2e-debug
      # before tearing down kind, so the upload below captures real state. If
      # the script crashes before its trap fires, this artifact will be empty.
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cluster-e2e-logs
          path: /tmp/e2e-debug/
          retention-days: 7
          if-no-files-found: warn

  e2e-cosi:
    name: COSI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run COSI e2e tests
        run: make test-e2e-cosi

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cosi-e2e-logs
          path: /tmp/e2e-debug/
          retention-days: 7
          if-no-files-found: warn

  e2e-multicluster:
    name: Multi-Cluster E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run multi-cluster e2e tests
        run: make test-e2e-multicluster

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: multicluster-e2e-logs
          path: /tmp/e2e-debug/
          retention-days: 7
          if-no-files-found: warn

  e2e-external-gateway:
    name: External Gateway E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run external gateway e2e tests
        run: make test-e2e-external-gateway

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: external-gateway-e2e-logs
          path: /tmp/e2e-debug/
          retention-days: 7
          if-no-files-found: warn

  e2e-ipv6:
    name: IPv6 Dual-Stack E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Run IPv6 dual-stack e2e tests
        run: make test-e2e-ipv6

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ipv6-e2e-logs
          path: /tmp/e2e-debug/
          retention-days: 7
          if-no-files-found: warn

