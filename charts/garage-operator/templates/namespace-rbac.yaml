{{- if and .Values.rbac.create (include "garage-operator.isNamespaceScoped" .) -}}
{{- $fullname := include "garage-operator.fullname" . -}}
{{- $labels := include "garage-operator.labels" . -}}
{{- $saName := include "garage-operator.serviceAccountName" . -}}
{{- $releaseNamespace := .Release.Namespace -}}
{{- $watchedNamespaces := splitList "," (include "garage-operator.watchedNamespaces" .) -}}
{{- range $ns := $watchedNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-manager-role
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
rules:
# Core resources
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
# Apps resources
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Policy resources for PodDisruptionBudget
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Garage custom resources
- apiGroups:
  - garage.rajsingh.info
  resources:
  - garageadmintokens
  - garagebuckets
  - garageclusters
  - garagekeys
  - garagenodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Finalizers for Garage resources
- apiGroups:
  - garage.rajsingh.info
  resources:
  - garageadmintokens/finalizers
  - garagebuckets/finalizers
  - garageclusters/finalizers
  - garagekeys/finalizers
  - garagenodes/finalizers
  verbs:
  - update
# Status updates for Garage resources
- apiGroups:
  - garage.rajsingh.info
  resources:
  - garageadmintokens/status
  - garagebuckets/status
  - garageclusters/status
  - garagekeys/status
  - garagenodes/status
  verbs:
  - get
  - patch
  - update
# Prometheus Operator ServiceMonitor
- apiGroups:
  - monitoring.coreos.com
  resources:
  - servicemonitors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-manager-rolebinding
  namespace: {{ $ns }}
  labels:
    {{- $labels | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ $releaseNamespace }}
{{- end }}
{{- end }}
