# This patch adds the cert-manager CA inject annotation to all webhook
# configurations and CRDs with conversion strategy Webhook so cert-manager
# stuffs the serving CA bundle into them.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: system/serving-cert
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: system/serving-cert
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: garageclusters.garage.rajsingh.info
  annotations:
    cert-manager.io/inject-ca-from: system/serving-cert
