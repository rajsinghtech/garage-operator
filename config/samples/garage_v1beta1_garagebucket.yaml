apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  labels:
    app.kubernetes.io/name: garage-operator
    app.kubernetes.io/managed-by: kustomize
  name: my-bucket
  namespace: garage-operator-system
spec:
  clusterRef:
    name: garage

  # Bucket quotas
  quotas:
    maxSize: 10Gi
    maxObjects: 100000

  # Key permissions
  keyPermissions:
    - keyRef:
        name: app-key
      read: true
      write: true

  # Note: CORS rules are NOT supported by the operator. Configure them
  # via the S3 PutBucketCors API directly if needed.
---
# Website bucket example
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: website-bucket
  namespace: garage-operator-system
spec:
  clusterRef:
    name: garage

  website:
    enabled: true
    indexDocument: index.html
    errorDocument: error.html

  # Public read access
  keyPermissions:
    - keyRef:
        name: website-key
      read: true
      owner: true
---
# Metrics bucket (referenced by monitoring-key's allBuckets + bucketPermissions)
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: metrics-bucket
  namespace: garage-operator-system
spec:
  clusterRef:
    name: garage

  quotas:
    maxSize: 5Gi
---
# Log retention bucket: expire objects after 14 days, abort stale multipart
# uploads after 3 days. Garage runs the lifecycle worker daily at midnight UTC,
# so rule evaluation is asynchronous from reconciliation.
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: logs-bucket
  namespace: garage-operator-system
spec:
  clusterRef:
    name: garage

  lifecycle:
    rules:
      - id: expire-app-logs
        status: Enabled
        filter:
          prefix: app/
        expirationDays: 14
        abortIncompleteMultipartUploadDays: 3
      - id: expire-audit-logs
        status: Enabled
        filter:
          prefix: audit/
        expirationDays: 90
