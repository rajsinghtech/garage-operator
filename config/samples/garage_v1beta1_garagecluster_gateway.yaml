# Legacy v1beta1 GarageCluster gateway manifest. v1beta1 is deprecated; the
# operator converts v1beta1 gateway CRs into v1beta2 edge-gateway form via
# the conversion webhook. For new manifests prefer
# garage_v1beta2_garagecluster_gateway.yaml.

apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  labels:
    app.kubernetes.io/name: garage-operator
    app.kubernetes.io/managed-by: kustomize
  name: garage-gateway
  namespace: garage-operator-system
spec:
  image: dxflrs/garage:v2.3.0

  replicas: 2
  gateway: true

  # Connect to a storage cluster in the same namespace.
  connectTo:
    clusterRef:
      name: garage

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  zone: edge-1

  network:
    rpcSecretRef:
      name: garage-rpc-secret
      key: rpc-secret

  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token
