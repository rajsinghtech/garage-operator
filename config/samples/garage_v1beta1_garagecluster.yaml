# Legacy v1beta1 GarageCluster manifest. v1beta1 is deprecated but still served
# for backward compatibility — the operator converts it up to v1beta2 on read
# via a conversion webhook. New manifests should use v1beta2; see
# garage_v1beta2_garagecluster.yaml for the tier-based schema.

apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  labels:
    app.kubernetes.io/name: garage-operator
    app.kubernetes.io/managed-by: kustomize
  name: garage
  namespace: garage-operator-system
spec:
  image: dxflrs/garage:v2.3.0

  replicas: 3

  replication:
    factor: 3
    consistencyMode: consistent

  storage:
    metadata:
      size: 10Gi
    data:
      size: 100Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  zone: us-east-1

  network:
    rpcSecretRef:
      name: garage-rpc-secret
      key: rpc-secret

  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token
