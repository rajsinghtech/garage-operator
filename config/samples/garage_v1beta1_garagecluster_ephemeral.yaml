# Legacy v1beta1 ephemeral GarageCluster manifest. v1beta1 is deprecated; for
# new manifests prefer garage_v1beta2_garagecluster_ephemeral.yaml.
# WARNING: All data is lost on pod restart!
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  name: garage-ephemeral
spec:
  replicas: 1
  replication:
    factor: 1
  storage:
    metadata:
      type: EmptyDir
    data:
      type: EmptyDir
  s3Api:
    bindPort: 3900
    region: garage
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  name: garage-ephemeral-limited
spec:
  replicas: 1
  replication:
    factor: 1
  storage:
    metadata:
      type: EmptyDir
      size: 1Gi
    data:
      type: EmptyDir
      size: 10Gi
  s3Api:
    bindPort: 3900
    region: garage
